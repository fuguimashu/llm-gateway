services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MASTER_KEY:    ${MASTER_KEY:-changeme}
      DATABASE_URL:  ${DATABASE_URL:-sqlite:///./data/llm_gateway.db}
      CONFIG_PATH:   /app/config.yaml
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Mount your config (must exist before first run)
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production

volumes: {}
